<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e1e, #444);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2em;
            opacity: 0.8;
        }

        .emoji {
            font-size: 4em;
            margin-bottom: 20px;
        }

        /* Spinner */
        .spinner {
            margin: 25px auto;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .home-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            color: white;
            border: 2px solid white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .home-link:hover {
            background: white;
            color: #222;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="emoji">🚧</div>
        <h1>Page Under Construction</h1>
        <p>I'm working on something awesomely delicious. Check back soon!</p>

        <div class="spinner"></div>

        <a href="index.html" class="home-link">Back to Home</a>
    </div>
</body>
</html>
