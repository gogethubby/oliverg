<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GSAP Animated Butterfly</title>
  <style>
    body {
      margin: 0;
      background: #e0f7fa;
      overflow: hidden;
    }
    
    svg {
      width: 13vw;
      height: 13vh;
    }
  </style>
</head>
<body>


<svg viewBox="0 0 200 200">
  <g id="butterfly" transform="translate(100, 100)">
    <!-- Left Wing -->
    <path id="leftWing" fill="#f48fb1" d="M0,0 C-40,-60 -80,-40 -70,-10 C-60,20 -30,30 0,0" />
    
    <!-- Right Wing -->
    <path id="rightWing" fill="#f48fb1" d="M0,0 C40,-60 80,-40 70,-10 C60,20 30,30 0,0" />
    
    <!-- Body -->
    <ellipse fill="#4e342e" cx="0" cy="0" rx="5" ry="20" />
  </g>
</svg>


<!-- GSAP Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>
  // Flap wings
  gsap.to("#leftWing", {
    rotation: 9,
    transformOrigin: "67% 100%",
    yoyo: false,
    repeat: -1,
    duration: 0.1,
   ease:"sine.easeOut"
  });

  gsap.to("#rightWing", {
    rotation: 14,
    transformOrigin: "67% 100%",
    yoyo: false,
    repeat: -1,
    duration: 0.1,
    ease: "sine.easeIn"
  });

  // Butterfly floating movement
  gsap.to("#butterfly", {
    x: 110,
    y: 140,
    repeat: -1,
    yoyo: true,
    duration: 10,
    ease: "power1.inOut"
  });

  gsap.to("#butterfly", {
    rotation: 10,
    repeat: -1,
    yoyo: true,
    duration: 2,
    ease: "sine.yoyo"
  });
</script>

</body>
</html>
